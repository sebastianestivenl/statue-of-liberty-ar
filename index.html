<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Statue of Liberty AR Experience</title>

<script type="module"
src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.3.1/model-viewer.min.js">
</script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    padding:20px;
}

h1{
    margin-bottom:10px;
}

p{
    max-width:700px;
    margin:auto;
}

model-viewer{
    width:100%;
    height:75vh;
    background:#1e293b;
}

#ar-button{
    background:#2563eb;
    border:none;
    border-radius:10px;
    color:white;
    padding:12px 20px;
    font-size:18px;
    cursor:pointer;
}

.instructions{
    padding:20px;
    font-size:18px;
}
</style>
</head>

<body>

<header>
    <h1>Statue of Liberty AR</h1>
    <p>
        Explore one of the most famous landmarks in the United States.
        Rotate the model or place it in your classroom using AR.
    </p>
</header>

<model-viewer
    src="statue_of_liberty.glb"
    alt="Statue of Liberty"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    scale="1 1 1">

    <button slot="ar-button" id="ar-button">
        View in AR
    </button>

</model-viewer>

<div class="instructions">
    <p>
        Tap "View in AR" and point your camera at the floor.
        Walk around the monument and observe its details.
    </p>
</div>

</body>
</html>
